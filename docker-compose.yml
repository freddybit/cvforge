services:
    cvforge-api:
        container_name: cvforge-api
        build:
            context: ./cvforge-api
            dockerfile: Dockerfile
            target: runner
        ports:
            - '3000:3000'
        volumes:
            - ./cvforge-api:/usr/src/app
            - /usr/src/app/node_modules
        environment:
            - NODE_ENV=development
            - PORT=3000
        command: npm run start:dev